services:

  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    image: echopose_aggregator:latest
    ports:
      - "${AGGREGATOR_HTTP_PORT:-3000}:${AGGREGATOR_HTTP_PORT:-3000}"    # HTTP + WebSocket
      - "${AGGREGATOR_UDP_PORT:-5005}:${AGGREGATOR_UDP_PORT:-5005}/udp"   # ESP32 CSI stream
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  inference:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./inference:/app
      - ./.env:/app/.env
    command: >
      sh -c "pip install -r requirements.txt -q && gunicorn server:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:${INFERENCE_WS_PORT:-8765}"
    ports:
      - "${INFERENCE_WS_PORT:-8765}:${INFERENCE_WS_PORT:-8765}"    # WebSocket to UI
    env_file:
      - .env
    depends_on:
      - aggregator
    restart: unless-stopped
